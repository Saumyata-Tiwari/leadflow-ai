<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reset Password — LeadFlow AI</title>
<style>
body{font-family:Arial,sans-serif;background:#3A2E24;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
.card{background:#2E2318;padding:40px;border-radius:12px;width:340px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
h2{color:#F2E0C8;margin-top:0}
input{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:none;box-sizing:border-box}
button{width:100%;padding:10px;background:#D4895A;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-top:10px}
p{color:#F2E0C8;font-size:13px}
#msg{color:#D4895A;font-size:13px;margin-top:10px}
</style>
</head>
<body>
<div class="card">
<h2>Reset your password</h2>
<input type="password" id="newpw" placeholder="New password (min 6 chars)">
<button onclick="doReset()">Reset Password</button>
<div id="msg"></div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");
async function doReset(){
  const pw = document.getElementById("newpw").value;
  const msg = document.getElementById("msg");
  if(!token){ msg.textContent="Missing reset token in link."; return; }
  if(pw.length < 6){ msg.textContent="Password must be at least 6 characters."; return; }
  try{
    const r = await fetch("/auth/reset-password", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({token, new_password: pw})
    });
    const d = await r.json();
    if(r.ok && d.success){
      msg.style.color="#4CAF50";
      msg.textContent = "Password reset! Redirecting to login...";
      setTimeout(()=>{ window.location.href="/login"; }, 1500);
    } else {
      msg.textContent = d.detail || d.message || "Reset failed.";
    }
  } catch(e){ msg.textContent = "Network error: "+e; }
}
</script>
</body>
</html>
